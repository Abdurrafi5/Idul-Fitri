<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Selamat Hari Raya Idul Fitri</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- BACKGROUND -->
<div class="bg">
  <div class="moon"></div>
  <div class="stars"></div>
  <div class="stars2"></div>
  <div class="stars3"></div>
</div>

<div class="container">

  <div class="avatar">
    <video src="avatar.mp4" autoplay loop muted></video>
  </div>

  <h1>Selamat Hari Raya Idul Fitri 🥳💗</h1>

  <button id="startBtn">Klik Pesan 💌</button>

  <div class="card hidden" id="card">
    <p id="typing" style="display:none;"></p>
  </div>

  <div class="buttons hidden" id="buttons">
    <button id="mau">Mau 😇</button>
    <button id="gamau">Gak Mau 😈</button>
  </div>

</div>

<div class="bubble" id="popup"></div>

<img src="jumpscare.png" id="jumpscare">

<audio id="sound" src="sound.mp3"></audio>
<audio id="music" src="music.mp3" loop></audio>

<script src="script.js"></script>
</body>
</html>
